{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-4">
<h3>Đổi mật khẩu</h3>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label>Mật khẩu cũ</label>
{{ form.old_password }}
</div>

<div class="mb-3">
<label>Mật khẩu mới</label>
{{ form.new_password1 }}
</div>

<div class="mb-3">
<label>Nhập lại mật khẩu mới</label>
{{ form.new_password2 }}
</div>

<button class="btn btn-primary">Đổi mật khẩu</button>

</form>
</div>

{% endblock %}
